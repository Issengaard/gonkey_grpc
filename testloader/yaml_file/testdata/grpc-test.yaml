- name: "SayHello — success"
  transport: grpc
  path: "helloworld.Greeter/SayHello"
  request: '{"name": "World"}'
  headers:
    authorization: "Bearer token123"
  proto_source:
    type: reflection
  response:
    0: '{"message": "Hello, World!"}'  # gRPC: 0 = codes.OK

- name: "SayHello — not found"
  transport: grpc
  path: "helloworld.Greeter/SayHello"
  request: '{"name": "nonexistent"}'
  proto_source:
    type: protoset
    protoset_file: "testdata/service.protoset"
  response:
    5: ''
